# Preseed per l'installer Debian (d-i) di ollozunaOS.
# Principio (AD-6): il disco di sistema viene SCELTO durante l'installazione
# (non è più forzato qui). Così l'OS può andare su una chiavetta USB o su un
# disco piccolo dedicato, lasciando gli altri dischi liberi per lo storage
# (RAID/share) gestibile dalla UI. La guided partitioning tocca SOLO il disco
# selezionato: gli altri restano intatti.
#
# Tutto il resto (locale, tastiera, rete, utente, pacchetti) resta automatico:
# l'installer si ferma solo per (1) scelta del disco e (2) destinazione di GRUB.

### Locale e tastiera
d-i debian-installer/locale string it_IT.UTF-8
d-i keyboard-configuration/xkb-keymap select it

### Rete (DHCP)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string ollozunaos
d-i netcfg/get_domain string local

### Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Orologio
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Rome
d-i clock-setup/ntp boolean true

### Utente di sistema (l'admin della UI si crea poi con nasctl)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string NAS Admin
d-i passwd/username string nasadmin
# Password NON preimpostata: l'installer la CHIEDE durante l'installazione.
# Con root disabilitato, d-i aggiunge 'nasadmin' al gruppo sudo.
d-i user-setup/allow-password-weak boolean true

### Scrub preventivo dei dischi PRIMA del partizionamento (AD-7)
# Motivo: superblock RAID residui su dischi già usati vengono riassemblati come
# array orfani (tipicamente /dev/md127) durante il rilevamento dischi. Questo
# blocca/rallenta l'installer e grub-installer ("raid orfani"). Qui, appena
# prima di partman, fermiamo TUTTI gli array e azzeriamo su ogni disco fisso i
# superblock mdadm + tutte le firme (testa e coda del device), rendendoli
# vergini. Escludiamo il supporto di installazione (/cdrom o live medium).
# ATTENZIONE: azione DISTRUTTIVA sui dischi fissi — coerente con un NAS che
# riconfigura lo storage dalla UI dopo l'installazione. La logica (con protezione
# di supporto d'installazione / disco di boot, inclusi SSD SATA su convertitore
# USB->SATA con Ventoy) è in /scrub-disks.sh, incluso nell'initrd dell'installer.
d-i partman/early_command string sh /scrub-disks.sh || true

### Partizionamento — il disco è SCELTO durante l'installazione (AD-6)
# partman-auto/disk NON è preimpostato: con più dischi d-i chiede quale usare.
# La guided partitioning agisce solo sul disco selezionato; gli altri restano intatti.
d-i partman-auto/method string regular
# Conferme automatiche: si applicano SOLO al disco sopra; gli altri restano intatti.
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
# Non toccare array/volumi esistenti su altri dischi.
d-i partman-md/confirm boolean false
d-i partman-md/confirm_nooverwrite boolean false

### Pacchetti base (nasd e i servizi NAS arrivano dalle package-lists di live-build)
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
# Disabilita os-prober durante l'installazione di GRUB. Su un NAS con più dischi
# dati (RAID/storage) os-prober monta e scandisce OGNI partizione di OGNI disco
# per cercare altri sistemi operativi: è la causa principale della lentezza di
# "installazione di GRUB". Qui non serve (sistema single-boot) → lo saltiamo.
d-i grub-installer/with_other_os boolean false
# bootdev NON preimpostato: d-i chiede su quale disco installare GRUB, così
# finisce sullo stesso disco/chiavetta dell'OS (utile quando l'OS è su USB).
#
# Target USB (AD-6): niente scrittura NVRAM + fallback rimovibile.
# Su boot UEFI grub-installer, se non gli si dice il contrario, invoca
# grub-install SENZA --no-nvram → chiama efibootmgr per creare una voce di
# boot. Su molti firmware quella scrittura va in timeout e ritenta per minuti:
# è la causa principale della lentezza di "Installazione di GRUB" su chiavetta.
# Oltretutto una voce NVRAM che punta a una USB è inutile (invalida appena la
# si sposta). Quindi:
#   update-nvram=false            → grub-install --no-nvram (niente efibootmgr)
#   force-efi-extra-removable=true → grub-install --force-extra-removable:
#                                    installa \EFI\BOOT\bootx64.efi, così la
#                                    chiavetta resta avviabile ovunque senza
#                                    dipendere da una voce NVRAM.
d-i grub-installer/update-nvram boolean false
d-i grub-installer/force-efi-extra-removable boolean true

### Fine: nessun riavvio interattivo
d-i finish-install/reboot_in_progress note
